      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.aggregators.example.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.aggregators.example.com:8051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.aggregators.example.com:8051
      - CORE_PEER_LOCALMSPID=AggregatorsMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.aggregators.example.com:11494
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0org1"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    volumes:
      - ../organizations/peerOrganizations/aggregators.example.com/peers/peer0.aggregators.example.com:/etc/hyperledger/fabric
      - peer0.aggregators.example.com:/var/hyperledger/production
    working_dir: /root
    command: peer node start
    ports:
