---
name: test-network-org${ORG}
version: 1.0.0

client:
  organization: ${ORG_CAP}
  connection:
    timeout:
      peer:
        endorser: '300'
      orderer: '300'

organizations:
  ${ORG}:
    mspid: ${ORG_CAP}MSP
    peers:
      - peer0.${ORG}.example.com
    certificateAuthorities:
      - ca.${ORG}.example.com

orderers:
  orderer.example.com:
    url: grpcs://localhost:${ORDERER_PORT}
    tlsCACerts:
      pem: |
        ${ORDERERPEM}
    grpcOptions:
      ssl-target-name-override: orderer.example.com
      hostnameOverride: orderer.example.com

peers:
  peer0.${ORG}.example.com:
    url: grpcs://localhost:${P0PORT}
    tlsCACerts:
      pem: |
        ${PEERPEM}
    grpcOptions:
      ssl-target-name-override: peer0.${ORG}.example.com
      hostnameOverride: peer0.${ORG}.example.com

certificateAuthorities:
  ca.${ORG}.example.com:
    url: https://localhost:${CAPORT}
    caName: ca-${ORG}
    tlsCACerts:
      pem:
        - |
          ${CAPEM}
    httpOptions:
      verify: false

  ca.orderer.example.com:
    url: https://localhost:${ORDERER_CA_PORT}
    caName: ${ORDERER_CA_NAME}
    tlsCACerts:
      pem:
        - |
          ${ORDERER_CAPEM}
    httpOptions:
      verify: false
